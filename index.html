<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Vimarsh | MSU Baroda</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&family=Orbitron:wght@400;700;900&family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bgDark: '#0a0a0a',
            surface: '#121212',
            surfaceLight: '#1e1e1e',
            primary: '#ff6a00',
            'gradient-primary': 'linear-gradient(135deg, #ff6a00 0%, #ff9a00 100%)',
            primaryGlow: 'rgba(255, 106, 0, 0.5)',
            secondary: '#ff9a00',
            accentBlue: '#00f0ff',
            accentPurple: '#7000ff',
            accentGreen: '#00ff9d',
            textMain: '#e0e0e0',
            textMuted: '#888888'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'spin-slow': 'spin 15s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e1e1e;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ff6a00;
    }

    /* Selection */
    ::selection {
      background: #ff6a00;
      color: #fff;
    }

    /* ── Social Icon Buttons ─────────────────────────────────── */
    .social-icon-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      transition: color 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55), border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
      text-decoration: none;
    }

    .social-icon-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-color: var(--social-color);
      z-index: 0;
      top: 100%;
      transition: none;
    }

    .social-icon-btn:hover::after {
      animation: social-bg-up 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    .social-icon-btn:hover {
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 26px color-mix(in srgb, var(--social-color) 55%, transparent);
      overflow: visible;
    }

    .social-icon-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .social-tooltip {
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      background: #fff;
      color: var(--social-color, #333);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.25);
      z-index: 10;
    }

    .social-tooltip::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: #fff;
    }

    .social-icon-btn:hover .social-tooltip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @keyframes social-bg-up {
      from {
        top: 100%;
      }

      to {
        top: 0%;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.42.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.575.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "three": "https://esm.sh/three@^0.183.0"
  }
}
</script>

</head>

</body>

</html>
